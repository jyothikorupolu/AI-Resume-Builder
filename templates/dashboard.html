<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer - Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container{
            width:90%;
            max-width:700px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(15px);
            border-radius:20px;
            padding:40px;
            text-align:center;
            color:white;
            box-shadow:0 8px 25px rgba(0,0,0,0.2);
        }

        h1{
            font-size:2.5rem;
            margin-bottom:15px;
        }

        .welcome{
            font-size:1.1rem;
            margin-bottom:35px;
            opacity:0.95;
        }

        .btn{
            display:inline-block;
            text-decoration:none;
            padding:14px 28px;
            border:none;
            border-radius:12px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
            margin:10px;
        }

        .upload-btn{
            background:#00c853;
            color:white;
        }

        .upload-btn:hover{
            background:#00a844;
            transform:translateY(-3px);
        }

        .logout-btn{
            background:#ff9800;
            color:white;
        }

        .logout-btn:hover{
            background:#e68900;
            transform:translateY(-3px);
        }

        .delete-btn{
            background:#e53935;
            color:white;
        }

        .delete-btn:hover{
            background:#c62828;
            transform:translateY(-3px);
        }

        .features{
            margin-top:35px;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
            gap:15px;
        }

        .feature-card{
            background:rgba(255,255,255,0.15);
            padding:15px;
            border-radius:12px;
        }

        .feature-card h3{
            margin-bottom:8px;
        }

        @media(max-width:600px){
            h1{
                font-size:2rem;
            }

            .container{
                padding:25px;
            }

            .btn{
                width:100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>🚀 AI Resume Analyzer</h1>

        <p class="welcome">
            Welcome, <strong>{{ session['user'] }}</strong>
        </p>

        <a href="/upload_resume">
            <button class="btn upload-btn">
                📄 Upload Resume
            </button>
        </a>

        <br>

        <a href="/logout">
            <button class="btn logout-btn">
                🔓 Logout
            </button>
        </a>

        <form action="/delete_account"
              method="POST"
              onsubmit="return confirm('Are you sure you want to delete your account?');">

            <button type="submit" class="btn delete-btn">
                🗑 Delete Account
            </button>
        </form>

        <div class="features">

            <div class="feature-card">
                <h3>📊 ATS Score</h3>
                <p>Analyze resume quality instantly.</p>
            </div>

            <div class="feature-card">
                <h3>🛠 Skill Analysis</h3>
                <p>Identify technical strengths.</p>
            </div>

            <div class="feature-card">
                <h3>🎯 Suggestions</h3>
                <p>Get AI-powered recommendations.</p>
            </div>

            <div class="feature-card">
                <h3>🔍 Keywords</h3>
                <p>Find missing ATS keywords.</p>
            </div>

        </div>

    </div>

</body>
</html>
