<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AI Resume Analyzer</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .container{
            width:400px;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:20px;
            box-shadow:0 8px 25px rgba(0,0,0,0.2);
            color:white;
        }

        h2{
            text-align:center;
            margin-bottom:10px;
            font-size:2rem;
        }

        .subtitle{
            text-align:center;
            margin-bottom:25px;
            opacity:0.9;
            font-size:14px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            outline:none;
            margin-bottom:20px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:#00c853;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#00a844;
            transform:translateY(-2px);
        }

        .back-link{
            text-align:center;
            margin-top:20px;
        }

        .back-link a{
            color:white;
            text-decoration:none;
            font-weight:500;
        }

        .back-link a:hover{
            text-decoration:underline;
        }

        .error{
            margin-top:15px;
            background:#ffebee;
            color:#c62828;
            padding:10px;
            border-radius:8px;
            text-align:center;
        }

        .icon{
            text-align:center;
            font-size:50px;
            margin-bottom:10px;
        }

        @media(max-width:450px){
            .container{
                width:90%;
                padding:30px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="icon">🔐</div>

    <h2>Forgot Password</h2>

    <p class="subtitle">
        Enter your registered email to receive a password reset OTP.
    </p>

    <form method="post" action="/forgot_password">

        <label>Email Address</label>

        <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <button type="submit">
            Send OTP
        </button>

    </form>

    <div class="back-link">
        <a href="/login">← Back to Login</a>
    </div>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

</div>

</body>
</html>
